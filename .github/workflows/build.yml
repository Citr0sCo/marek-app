name: Build

on:
  pull_request:
  merge_group:
    types:
        - checks_requested

concurrency:
  group: build-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:

  build-fe:
    runs-on: self-hosted
    container:
      image: node:22
    steps:
      - uses: actions/checkout@v4

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock') }}

      - name: Install dependencies
        run: yarn --frozen-lockfile --prefer-offline

      - name: Build FE
        run: npm run build


  build-be:
    runs-on: self-hosted
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0

    steps:
      - uses: actions/checkout@v4

      - name: Building BE
        run: dotnet build api/Citr0sApp.sln


  test-fe:
    runs-on: self-hosted
    container:
      image: node:22

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: yarn --frozen-lockfile --prefer-offline

      # - name: Testing FE
      #   run: npm run test-ci


  test-be:
    runs-on: self-hosted
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0

    steps:
      - uses: actions/checkout@v4

      - name: Testing BE
        run: dotnet test api/Citr0sApp.sln


  lint-fe:
    runs-on: self-hosted
    container:
      image: node:22

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: yarn --frozen-lockfile --prefer-offline

      # - name: Linting FE
      #   run: npm run lint


  docker-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t home-app . --platform linux/amd64
